      Soy una persona curiosa, 
      sociable y con muchas ganas de seguir aprendiendo cosas nuevas. 
      Me encanta viajar, conocer otras culturas y los idiomas, algo que me ha llevado a vivir experiencias tan diferentes como enseñar español en China.
      A lo largo de los años he trabajado de dependiente, camarero, barman y monitor infantil, por lo que estoy muy acostumbrado a tratar con todo tipo de personas (y a mantener la calma en situaciones inesperadas). 
      Actualmente estoy centrando gran parte de mi energía en formarme como Full Stack Developer, un mundo que me apasiona cada día más.
      Me motiva resolver problemas, aprender nuevas tecnologías y sus lenguajes y seguir creciendo profesionalmente. 
      Si algo define mi trayectoria es la capacidad de adaptarme a entornos muy distintos y las ganas de afrontar nuevos retos con una sonrisa y buena actitud.
    
